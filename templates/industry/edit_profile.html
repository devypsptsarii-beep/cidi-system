{% extends "base.html" %}
{% block title %}Edit Profile - CIDI 4.0{% endblock %}
{% block content %}
<div class="dashboard">
    <div class="dashboard-header">
        <h1><i class="fas fa-building"></i> Edit Industry Profile</h1>
        <a href="{{ url_for('industry.dashboard') }}" class="btn-back">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>
    <div class="form-card">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Industry / Institution Name</label>
                <input type="text" name="industry_name" value="{{ profile.industry_name }}" required>
            </div>
            <div class="form-group">
                <label>Sector / Type</label>
                <select name="sector">
                    <option value="Manufacturing"  {% if profile.sector == 'Manufacturing'  %}selected{% endif %}>Manufacturing</option>
                    <option value="Technology"     {% if profile.sector == 'Technology'     %}selected{% endif %}>Technology</option>
                    <option value="Energy"         {% if profile.sector == 'Energy'         %}selected{% endif %}>Energy</option>
                    <option value="Healthcare"     {% if profile.sector == 'Healthcare'     %}selected{% endif %}>Healthcare</option>
                    <option value="Education"      {% if profile.sector == 'Education'      %}selected{% endif %}>Education</option>
                    <option value="Government"     {% if profile.sector == 'Government'     %}selected{% endif %}>Government</option>
                    <option value="Logistics"      {% if profile.sector == 'Logistics'      %}selected{% endif %}>Logistics</option>
                    <option value="Other"          {% if profile.sector == 'Other'          %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea name="address" rows="3">{{ profile.address }}</textarea>
            </div>
            <div class="form-group">
                <label>Contact Number</label>
                <input type="text" name="contact_number" value="{{ profile.contact_number }}">
            </div>
            <button type="submit" class="btn-submit">
                <i class="fas fa-save"></i> Save Changes
            </button>
        </form>
    </div>
</div>
{% endblock %}
